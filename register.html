{% extends 'base.html' %}
{% block content %}
<div class="auth-wrapper fade-in">
    <div class="auth-card glass-panel">
        <h2 class="neon-text">Create Vault</h2>
        <p class="subtitle text-center">Your private Free Fire IDs.</p>
        <form action="{{ url_for('register') }}" method="POST">
            <div class="form-group">
                <label>Email ID</label>
                <input type="email" name="email" class="glass-input" required placeholder="Enter Email">
            </div>
            <div class="form-group">
                <label>Secure Password</label>
                <input type="password" name="password" class="glass-input" required minlength="6" placeholder="Create Password">
            </div>
            <button type="submit" class="btn-glow w-100">Register</button>
        </form>
        <p class="switch-auth">Already have a vault? <a href="{{ url_for('login') }}">Login Here</a></p>
    </div>
</div>
{% endblock %}
